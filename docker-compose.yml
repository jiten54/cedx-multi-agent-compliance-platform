version: "3.8"

services:
  workspace:
    build: .
    container_name: cedx-agent-fleet-workspace
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY:-MY_GEMINI_API_KEY}
      - APP_URL=${APP_URL:-http://localhost:3000}
    restart: always
